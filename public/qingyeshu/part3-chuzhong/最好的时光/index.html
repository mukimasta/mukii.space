    <h1>最好的时光</h1>
    <h4>春游前后 · 初中集</h4>
    <p class="author-date"><time datetime="2016-04-01T00:00:00Z">April 1, 2016</time></p>

<p>——最好的时光就是在无事的时候，想想往事，惆惆怅。</p>
<p>把任何事都放下，走在城市的大路上，想想一切发生的事情，也不免觉得好笑。这时候，什么都不用考虑。书包背在肩膀上轻如鸿毛，没有成绩，生活，作业的压力，自然轻松如鹊。沉睡的思想里缥缥渺渺地浮现出生活的点点滴滴。这时光极为短暂，但足够美好。</p>
<p>其实，不在乎世界大不大，重要的是要去感受她。</p>
<p>2016年4月郁闷于放学路上</p>
