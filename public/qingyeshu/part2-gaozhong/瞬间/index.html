    <h1>瞬间</h1>
    <h4>夏日书 · 高中集</h4>
    <p class="author-date"><time datetime="2020-05-04T00:00:00Z">May 4, 2020</time></p>

<p>不是不肯放下面纱，<br>
春水还未涌入<br>
繁星点点，历历在目<br>
向过往的天边望去，<br>
有的是深邃的蓝<br>
舒缓的提琴声飘入，<br>
不念过往，又怎可能？</p>
<p>松柏挺着身子，<br>
湖水依然平静<br>
只是少了鸟儿叽喳，<br>
少了波光粼粼<br>
只是有些精彩的瞬间，<br>
再也不能遇到</p>
<p>——2020.5.4作于家中</p>
